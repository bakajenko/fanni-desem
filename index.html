<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Szeretlek Fanni</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9ec4, #ff6fa8, #ff3e8a);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      font-family: "Segoe UI", sans-serif;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: white;
      font-size: 4rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      animation: fadeIn 3s ease forwards;
      opacity: 0;
      z-index: 10;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      transform: rotate(45deg);
      animation: floatUp 6s linear infinite;
    }

    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
    }

    .heart:before {
      top: -10px;
      left: 0;
    }

    .heart:after {
      left: -10px;
      top: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) rotate(45deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Minden okés lesz ❤️</h1>
  <style>
    .envelope {
        width: 200px;
        height: 130px;
        background: #ff4d6d;
        margin: 50px auto;
        position: relative;
        cursor: pointer;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        transition: transform 0.3s;
    }

    .envelope:hover {
        transform: scale(1.05);
    }

    .envelope:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-bottom: 70px solid #ff758f;
    }

    .letter {
        display: none;
        width: 80%;
        margin: 30px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        font-size: 20px;
        line-height: 1.6;
        animation: fadeIn 1s ease forwards;
        white-space: pre-line;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="envelope" onclick="showLetter()"></div>

<div id="loveLetter" class="letter">
Nagyon ügyes leszel ne aggódj baby!!!!
</div>

<script>
function showLetter() {
    document.getElementById("loveLetter").style.display = "block";
}
</script>


  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
