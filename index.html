<!DOCTYPE html>

  <title>Szeretlek Fanni</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9ec4, #ff6fa8, #ff3e8a);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      font-family: "Segoe UI", sans-serif;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: white;
      font-size: 4rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      animation: fadeIn 3s ease forwards;
      opacity: 0;
      z-index: 10;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      transform: rotate(45deg);
      animation: floatUp 6s linear infinite;
    }

    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
    }

    .heart:before { top: -10px; left: 0; }
    .heart:after { left: -10px; top: 0; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
    }

    .envelope {
        width: 200px;
        height: 130px;
        background: #ff4d6d;
        margin-top: 20px;
        position: relative;
        cursor: pointer;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        transition: transform 0.3s;
        z-index: 20;
    }

    .envelope:hover {
        transform: scale(1.05);
    }

    .envelope:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-bottom: 70px solid #ff758f;
    }

    .letter {
        display: none;
        width: 80%;
        margin: 30px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        font-size: 20px;
        line-height: 1.6;
        animation: fadeIn 1s ease forwards;
        white-space: pre-line;
        z-index: 30;
    }

    .firework {
        position: fixed;
        width: 5px;
        height: 5px;
        background: transparent;
        border-radius: 50%;
        animation: explode 1s ease-out forwards;
        pointer-events: none;
        z-index: 5;
    }

    @keyframes explode {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(20); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>Ügyes vagy baby!✨</h1>

  <div class="envelope" onclick="showLetter()"></div>

  <div id="loveLetter" class="letter">
    Nyeremény: 10000 puszi!!!
  </div>

  <script>
    function showLetter() {
        document.getElementById("loveLetter").style.display = "block";
        startFireworks();
    }

    function startFireworks() {
        for (let i = 0; i < 20; i++) {
            setTimeout(createFirework, i * 150);
        }
    }

    function createFirework() {
        const fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = Math.random() * window.innerWidth + "px";
        fw.style.top = Math.random() * window.innerHeight + "px";
        fw.style.background = randomColor();
        document.body.appendChild(fw);

        setTimeout(() => fw.remove(), 1000);
    }

    function randomColor() {
        const colors = ["#ff4d6d", "#ffb3c6", "#ff8fab", "#ffccd5", "#ff577f", "#ff99ac"];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 300);
  </script>
